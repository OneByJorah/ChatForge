name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: TypeScript Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm audit --audit-level=high
